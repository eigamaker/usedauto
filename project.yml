name: UsedCarCity
options:
  bundleIdPrefix: jp.co.usedcarcity
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: カーシティ経営
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  UsedCarCity:
    type: application
    platform: iOS
    sources:
      - UsedCarCity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.co.usedcarcity.game
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - UsedCarCityTests
  UsedCarCityTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - UsedCarCityTests
    dependencies:
      - target: UsedCarCity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.co.usedcarcity.game.tests

